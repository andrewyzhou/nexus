<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="track.css" />
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="mobile.css" />
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@14.1.3/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="track-body track-page">

  <!-- TOP NAV (mockup style, shared with track.html) -->
  <div class="top-nav">
    <div class="top-nav-inner">
      <a href="index.html" class="logo logo-link">NEXUS</a>
      <div class="top-nav-right">
        <a href="https://ipick.ai" target="_blank" rel="noopener" class="ipick-logo-link"><img src="ipick-logo.png" alt="iPick.ai" class="ipick-logo" /><span class="ipick-logo-text">iPick.ai ↗</span></a>
        <button id="theme-toggle" class="theme-toggle" title="Toggle theme"></button>
        <a href="index.html" class="back-chip">
          <span class="back-arrow">←</span>
          graph
        </a>
      </div>
    </div>
  </div>

  <main id="track-main">

    <!-- HERO -->
    <section id="track-hero">
      <div class="hero-eyebrow-row">
        <span id="stock-eyebrow" class="hero-eyebrow">Stock</span>
        <span class="hero-eyebrow-line"></span>
      </div>

      <h1 id="stock-title" class="hero-title">Loading…</h1>

      <div class="hero-divider-row">
        <div class="hero-left">
          <p id="stock-description" class="hero-description"></p>
          <div id="stock-actions" class="hero-actions">
            <a id="stock-website" href="#" target="_blank" rel="noopener" class="hero-action-link" style="display:none">
              <span>Website</span>
              <span class="hero-action-arrow">↗</span>
            </a>
            <a id="stock-track-link" href="#" class="hero-track-chip" style="display:none">
              <span class="hero-track-dot"></span>
              <span id="stock-track-name"></span>
              <span class="hero-action-arrow">↗</span>
            </a>
          </div>
        </div>
        <div class="hero-meta">
          <div class="hero-meta-item">
            <div class="hero-meta-label">Price</div>
            <div id="stock-meta-price" class="hero-meta-value">—</div>
            <div id="stock-meta-change" class="hero-meta-change"></div>
          </div>
          <div class="hero-meta-divider"></div>
          <div class="hero-meta-item">
            <div class="hero-meta-label">Market Cap</div>
            <div id="stock-meta-mcap" class="hero-meta-value">—</div>
          </div>
          <div class="hero-meta-divider"></div>
          <div class="hero-meta-item">
            <div class="hero-meta-label">P/E</div>
            <div id="stock-meta-pe" class="hero-meta-value">—</div>
          </div>
        </div>
      </div>
    </section>

    <!-- STOCK CHART -->
    <section class="track-section">
      <div class="section-head">
        <div>
          <h2 class="section-title">Stock Chart</h2>
        </div>
      </div>
      <div class="chart-card">
        <div id="stock-chart-widget" style="height:500px;width:100%">
          <div class="tradingview-widget-container" style="height:100%;width:100%">
            <div class="tradingview-widget-container__widget" style="height:100%;width:100%"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- KEY STATS -->
    <section class="track-section">
      <div class="section-head">
        <div>
          <h2 class="section-title">Key Stats</h2>
          <p class="section-sub">Latest market data</p>
        </div>
      </div>
      <div id="stats-grid" class="stats-grid"></div>
    </section>

    <!-- AI SUMMARY -->
    <section class="track-section">
      <div class="ai-summary-card">
        <div class="ai-summary-topline"></div>
        <div class="ai-summary-header">
          <div class="ai-summary-title-group">
            <div class="ai-sparkles-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3l1.9 5.8L20 10.7l-5.1 3.7L17 21l-5-3.4L7 21l2.1-6.6L4 10.7l6.1-1.9z"/>
              </svg>
              <div class="ai-live-dot"></div>
            </div>
            <div>
              <h2 class="ai-summary-title">AI Summary</h2>
              <div id="summary-status" class="ai-summary-meta">Synthesized from sources · freshly generated</div>
            </div>
          </div>
          <div class="ai-fresh-badge">
            <div class="ai-fresh-dot"></div>
            <span>Fresh</span>
          </div>
        </div>
        <div id="ai-summary" class="ai-summary">
          <div class="summary-skeleton">
            <div class="skeleton-line"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line short"></div>
          </div>
        </div>
        <div class="ai-summary-footer">
          <button class="ai-regenerate" type="button">Regenerate ↻</button>
        </div>
      </div>
    </section>

    <!-- NEWS -->
    <section class="track-section">
      <div class="section-head">
        <div>
          <h2 class="section-title">Latest News</h2>
          <p id="news-count-sub" class="section-sub"></p>
        </div>
      </div>
      <div id="news-list" class="news-grid">
        <div class="news-empty">Loading news…</div>
      </div>
    </section>

  </main>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="theme.js"></script>
  <script src="summary.js"></script>
  <script src="stock.js?v=3"></script>
</body>
</html>
