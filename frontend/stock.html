<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="track.css" />
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="mobile.css" />
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <!-- Markdown rendering for AI summary prose. marked parses, DOMPurify
       strips anything unsafe. Both are tiny and cached via CDN. -->
  <script src="https://cdn.jsdelivr.net/npm/marked@14.1.3/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="track-body">
  <header id="header">
    <a href="index.html" class="logo logo-link">NEXUS</a>
    <div class="header-right">
      <a href="https://ipick.ai" target="_blank" rel="noopener" class="ipick-logo-link"><img src="ipick-logo.png" alt="iPick.ai" class="ipick-logo" /><span class="ipick-logo-text">iPick.ai ↗</span></a>
      <button id="theme-toggle" class="theme-toggle" title="Toggle theme"></button>
      <a href="index.html" class="back-link">← graph</a>
    </div>
  </header>

  <main id="track-main">
    <section id="track-hero">
      <div class="track-hero-inner">
        <div class="track-eyebrow" id="stock-track">Stock</div>
        <h1 id="stock-title">Loading…</h1>
        <p id="stock-description"></p>
        <div id="stock-website-wrap" style="display:none; margin-top:8px; margin-bottom:-12px">
          <a id="stock-website" href="#" target="_blank" rel="noopener" class="stock-website-link"><span class="website-arrow">↗&#xFE0E;</span> Website</a>
        </div>
        <div class="track-meta">
          <span id="stock-price" class="meta-pill"></span>
          <span id="stock-mcap" class="meta-pill"></span>
          <span id="stock-pe" class="meta-pill"></span>
          <span id="stock-sector" class="meta-pill"></span>
        </div>
      </div>
    </section>

    <section id="track-section">
      <div class="section-head">
        <h2>Stock Chart</h2>
      </div>
      <div id="stock-chart-widget" style="height:500px;width:100%">
        <div class="tradingview-widget-container" style="height:100%;width:100%">
          <div class="tradingview-widget-container__widget" style="height:100%;width:100%"></div>
        </div>
      </div>
    </section>

    <section id="track-section">
      <div class="section-head"><h2>Key Stats</h2></div>
      <div id="stats-grid" class="stats-grid"></div>
    </section>

    <section id="track-section" class="ai-summary-section">
      <div class="section-head">
        <h2>AI Summary</h2>
        <span id="summary-status" class="dim small"></span>
      </div>
      <div id="ai-summary" class="ai-summary">
        <div class="summary-skeleton">
          <div class="skeleton-line"></div>
          <div class="skeleton-line"></div>
          <div class="skeleton-line short"></div>
        </div>
      </div>
    </section>

    <section id="track-section">
      <div class="section-head">
        <h2>Latest News</h2>
      </div>
      <div id="news-list" class="news-list">
        <div class="news-empty">Loading news…</div>
      </div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="theme.js"></script>
  <script src="summary.js"></script>
  <script src="stock.js?v=2"></script>
</body>
</html>
