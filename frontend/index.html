<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="theme.css" />

  <!-- D3.js v7 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
</head>

<body>
  <div id="app">

    <!-- ── Header ──────────────────────────────────────────── -->
    <header id="header">
      <div class="logo">NEXUS</div>
      <div class="header-sep"></div>
      <div class="header-right">
        <a href="https://ipick.ai" target="_blank" rel="noopener" class="ipick-logo-link"><img src="ipick-logo.png" alt="iPick.ai" class="ipick-logo" /><span class="ipick-logo-text">iPick.ai ↗</span></a>
        <button id="theme-toggle" class="theme-toggle" title="Toggle theme">◐</button>
      </div>
    </header>

    <!-- ── Left Sidebar ────────────────────────────────────── -->
    <aside id="sidebar">

      <!-- Company search -->
      <div class="sidebar-section">
        <div class="sidebar-label">Search</div>
        <div class="search-wrap">
          <!-- magnifier icon -->
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input
            id="search-input"
            type="text"
            placeholder="Ticker or investment track"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
      </div>

      <!-- Separator -->
      <div class="sidebar-divider"></div>

      <!-- Pinned companies -->
      <div class="sidebar-section" id="pinned-section">
        <div class="tracks-header">
          <div class="sidebar-label">Companies</div>
          <div class="track-controls">
            <button id="pinned-add-all" class="track-control-btn">All</button>
            <button id="pinned-clear-all" class="track-control-btn">Clear</button>
          </div>
        </div>
        <div id="pinned-list"></div>
      </div>

      <!-- Track filters -->
      <div class="sidebar-section tracks-section">
        <div class="tracks-header">
          <div class="sidebar-label">Investment Tracks</div>
          <div class="track-controls">
            <button id="track-select-all" class="track-control-btn">All</button>
            <button id="track-clear-all" class="track-control-btn">Clear</button>
          </div>
        </div>
        <div id="track-list"></div>
      </div>

    </aside>

    <!-- ── Main Graph Canvas ────────────────────────────────── -->
    <main id="main">
      <div id="graph-canvas"></div>
      <div id="edge-legend"></div>
    </main>

  </div><!-- /#app -->

  <!-- ── Tooltip (lives outside app grid to avoid clipping) ── -->
  <div id="tooltip" aria-hidden="true"></div>

  <!-- ── Right Detail Panel ──────────────────────────────────── -->
  <aside id="detail-panel" aria-label="Company detail">
    <div id="panel-inner"></div>
  </aside>


  <script src="config.js"></script>
  <script src="theme.js"></script>
  <script src="main.js"></script>
</body>
</html>
