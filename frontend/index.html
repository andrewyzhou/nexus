<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="mobile.css" />

  <!-- D3.js v7 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <!-- Firebase compat SDK (sync global `firebase`) for auth gating -->
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
</head>

<body>
  <div id="app">

    <!-- ── Header ──────────────────────────────────────────── -->
    <header id="header">
      <button id="mobile-menu" class="mobile-menu-btn" aria-label="Add companies or tracks">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="logo">NEXUS</div>
      <div class="header-right">
        <a href="https://ipick.ai" target="_blank" rel="noopener" class="ipick-logo-link"><img src="ipick-logo.png" alt="iPick.ai" class="ipick-logo" /><span class="ipick-logo-text">iPick.ai ↗</span></a>
        <button id="theme-toggle" class="theme-toggle" title="Toggle theme"></button>
      </div>
    </header>
    <div id="mobile-backdrop" class="mobile-backdrop"></div>

    <!-- ── Mobile nav picker ───────────────────────────────── -->
    <div id="mobile-nav-picker" class="mobile-nav-picker" aria-hidden="true">
      <button class="nav-pick-btn" data-target="pinned-section">
        <span class="nav-pick-label">Companies</span>
      </button>
      <button class="nav-pick-btn" data-target="tracks-section">
        <span class="nav-pick-label">Investment Tracks</span>
      </button>
    </div>

    <!-- ── Left Sidebar ────────────────────────────────────── -->
    <aside id="sidebar">

      <!-- Company search -->
      <div class="sidebar-section">
        <div class="sidebar-label">Search</div>
        <div class="search-wrap">
          <!-- magnifier icon -->
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input
            id="search-input"
            type="text"
            placeholder="Ticker or investment track"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
      </div>

      <!-- Separator -->
      <div class="sidebar-divider"></div>

      <!-- Pinned companies -->
      <div class="sidebar-section" id="pinned-section">
        <div class="tracks-header">
          <div class="sidebar-label">Companies</div>
          <div class="track-controls">
            <button id="pinned-add-all" class="track-control-btn">All</button>
            <button id="pinned-clear-all" class="track-control-btn">Clear</button>
          </div>
        </div>
        <div id="pinned-list"></div>
      </div>

      <!-- Track filters -->
      <div class="sidebar-section" id="tracks-section">
        <div class="tracks-header">
          <div class="sidebar-label">Investment Tracks</div>
          <div class="track-controls">
            <button id="track-select-all" class="track-control-btn">All</button>
            <button id="track-clear-all" class="track-control-btn">Clear</button>
          </div>
        </div>
        <div id="track-list"></div>
      </div>

    </aside>

    <!-- ── Main Graph Canvas ────────────────────────────────── -->
    <main id="main">
      <div id="graph-canvas"></div>
      <div id="edge-legend"></div>
    </main>

  </div><!-- /#app -->

  <!-- ── Tooltip (lives outside app grid to avoid clipping) ── -->
  <div id="tooltip" aria-hidden="true"></div>

  <!-- ── Right Detail Panel ──────────────────────────────────── -->
  <aside id="detail-panel" aria-label="Company detail">
    <div id="panel-inner"></div>
  </aside>


  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="theme.js"></script>
  <script src="main.js"></script>
  <script>
    (function() {
      const menuBtn  = document.getElementById('mobile-menu');
      const sidebar  = document.getElementById('sidebar');
      const backdrop = document.getElementById('mobile-backdrop');
      const picker   = document.getElementById('mobile-nav-picker');
      if (!menuBtn || !sidebar || !backdrop || !picker) return;

      const closeSidebar = () => {
        sidebar.classList.remove('open');
        sidebar.classList.remove('show-pinned-only', 'show-tracks-only');
        backdrop.classList.remove('active');
      };
      const closePicker = () => {
        picker.classList.remove('active');
        picker.setAttribute('aria-hidden', 'true');
        backdrop.classList.remove('active');
      };

      menuBtn.addEventListener('click', () => {
        if (window.innerWidth > 768) {
          // Desktop: just toggle sidebar normally — never filter sections
          sidebar.classList.remove('show-pinned-only', 'show-tracks-only');
          sidebar.classList.toggle('open');
          backdrop.classList.toggle('active');
          return;
        }
        // Mobile: show the nav picker
        if (picker.classList.contains('active')) {
          closePicker();
        } else {
          picker.classList.add('active');
          picker.setAttribute('aria-hidden', 'false');
          backdrop.classList.add('active');
        }
      });

      const clearSidebarFilter = () => {
        sidebar.classList.remove('show-pinned-only', 'show-tracks-only');
      };

      picker.querySelectorAll('.nav-pick-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const targetId = btn.dataset.target;
          closePicker();
          // Mobile: show only the chosen section
          clearSidebarFilter();
          if (targetId === 'pinned-section') {
            sidebar.classList.add('show-pinned-only');
          } else if (targetId === 'tracks-section') {
            sidebar.classList.add('show-tracks-only');
          }
          sidebar.classList.add('open');
        });
      });

      backdrop.addEventListener('click', () => {
        closeSidebar();
        closePicker();
        clearSidebarFilter();
      });

      sidebar.addEventListener('click', (e) => {
        if (window.innerWidth > 768) return;
        const target = e.target.closest('.track-item, .pinned-item, .search-dropdown-item, a');
        if (target) closeSidebar();
      });
    })();
  </script>
</body>
</html>
