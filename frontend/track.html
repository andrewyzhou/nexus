<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="track.css" />
  <link rel="stylesheet" href="theme.css" />
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
</head>
<body class="track-body">
  <header id="header">
    <a href="index.html" class="logo logo-link">NEXUS</a>
    <div class="header-right">
      <a href="https://ipick.ai" target="_blank" rel="noopener" class="ipick-logo-link"><img src="ipick-logo.png" alt="iPick.ai" class="ipick-logo" /><span class="ipick-logo-text">iPick.ai ↗</span></a>
      <button id="theme-toggle" class="theme-toggle" title="Toggle theme">◐</button>
      <a href="index.html" class="back-link">← back to graph</a>
    </div>
  </header>

  <main id="track-main">
    <section id="track-hero">
      <div class="track-hero-inner">
        <div class="track-eyebrow">Investment Track</div>
        <h1 id="track-title">Loading…</h1>
        <p id="track-description"></p>
        <div class="track-meta">
          <span id="track-count" class="meta-pill"></span>
          <span id="track-leader" class="meta-pill"></span>
        </div>
      </div>
    </section>

    <section id="track-section">
      <div class="section-head">
        <h2>Companies</h2>
        <div class="sort-row">
          <label>Sort by
            <select id="sort-select">
              <option value="market_cap">Market cap</option>
              <option value="ticker">Ticker</option>
              <option value="name">Name</option>
              <option value="price">Price</option>
              <option value="pe_ratio">P/E ratio</option>
            </select>
          </label>
        </div>
      </div>
      <div id="company-table-wrap"></div>
    </section>

    <section id="track-section" class="ai-summary-section">
      <div class="section-head">
        <h2>AI Summary</h2>
        <span id="summary-status" class="dim small"></span>
      </div>
      <div id="ai-summary" class="ai-summary">
        <div class="summary-skeleton">
          <div class="skeleton-line"></div>
          <div class="skeleton-line"></div>
          <div class="skeleton-line short"></div>
        </div>
      </div>
    </section>

    <section id="track-section">
      <div class="section-head">
        <h2>News</h2>
      </div>
      <div id="news-list" class="news-list">
        <div class="news-empty">Loading news…</div>
      </div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="theme.js"></script>
  <script src="summary.js"></script>
  <script src="track.js"></script>
</body>
</html>
