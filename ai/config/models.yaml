defaults:
  smoke_summarizer: local-qwen2.5-7b
  smoke_judge: claude-sonnet

summarizers:
  - name: local-qwen2.5-1.5b
    provider: local
    model: qwen2.5-1.5b-instruct
    base_url_env: NEXUS_LOCAL_LLM_BASE_URL
    base_url: http://127.0.0.1:8001/v1
    api_key_env: NEXUS_LOCAL_LLM_API_KEY
    api_key: local-test-key
    temperature: 0.2
    enabled: true
