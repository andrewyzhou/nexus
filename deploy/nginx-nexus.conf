# nginx snippet for mounting Nexus at https://ipick.ai/nexus
#
# Append this into the existing ipick.ai server {} block in
#   /etc/nginx/sites-available/iseefin
# then `nginx -t && sudo systemctl reload nginx`.
#
# Assumes:
#   - the Nexus Flask app is running on 127.0.0.1:5001 (gunicorn, see nexus.service)
#   - the repo is cloned at /home/ubuntu/nexus
#   - ipick.ai's existing TLS cert already covers this path (no new certbot run needed)

# /nexus without trailing slash → redirect to /nexus/ so relative paths resolve.
location = /nexus { return 301 /nexus/; }

# Backend API — proxied to gunicorn. All endpoints are registered under
# /nexus/api inside the app, so the prefix is preserved in the upstream URL.
location /nexus/api/ {
    proxy_pass http://127.0.0.1:5001;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_http_version 1.1;
}

# Static frontend — served directly off disk, no Python in the hot path.
location /nexus/ {
    alias /home/ubuntu/nexus/frontend/;
    try_files $uri $uri/ /nexus/index.html;

    # Cache static assets aggressively; the HTML itself stays fresh.
    location ~* \.(css|js|png|jpg|jpeg|svg|woff2?)$ {
        alias /home/ubuntu/nexus/frontend/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
